<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e85d04;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f48c06;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="80" x2="1200" y2="80" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="160" x2="1200" y2="160" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="240" x2="1200" y2="240" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="320" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="320" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="320" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Orange accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)" rx="2"/>

  <!-- Left: Chef's hat icon area -->
  <g transform="translate(80, 100)">
    <!-- Chef hat -->
    <ellipse cx="60" cy="100" rx="55" ry="12" fill="#2a2a2a" stroke="#e85d04" stroke-width="1.5"/>
    <rect x="20" y="50" width="80" height="52" fill="#2a2a2a" rx="4"/>
    <ellipse cx="60" cy="50" rx="55" ry="22" fill="#333" stroke="#555" stroke-width="1"/>
    <ellipse cx="60" cy="38" rx="30" ry="25" fill="#3a3a3a" stroke="#555" stroke-width="1"/>
    <!-- Hat band -->
    <rect x="5" y="75" width="110" height="8" fill="#1a1a1a" rx="2"/>
    <rect x="5" y="75" width="110" height="8" fill="url(#accent)" opacity="0.3" rx="2"/>
  </g>

  <!-- Zellij "pane" grid illustration - right side -->
  <g transform="translate(680, 60)" opacity="0.85">
    <!-- Outer frame -->
    <rect width="440" height="200" fill="#111" stroke="#2a2a2a" stroke-width="1.5" rx="6"/>
    <!-- Zellij tab bar -->
    <rect width="440" height="28" fill="#1a1a1a" rx="6"/>
    <rect y="6" width="440" height="22" fill="#1a1a1a"/>

    <!-- Tabs -->
    <rect x="8" y="5" width="120" height="18" fill="#e85d04" rx="3" opacity="0.9"/>
    <text x="68" y="18" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle">⏳ brigade-fix-a1</text>

    <rect x="136" y="5" width="120" height="18" fill="#2a2a2a" rx="3"/>
    <text x="196" y="18" font-family="monospace" font-size="10" fill="#aaa" text-anchor="middle">✅ brigade-add-b2</text>

    <rect x="264" y="5" width="120" height="18" fill="#2a2a2a" rx="3"/>
    <text x="324" y="18" font-family="monospace" font-size="10" fill="#e85d04" text-anchor="middle">🔴 brigade-chore-c3</text>

    <!-- Pane divider -->
    <line x1="220" y1="28" x2="220" y2="200" stroke="#2a2a2a" stroke-width="1.5"/>

    <!-- Left pane content -->
    <text x="16" y="50" font-family="monospace" font-size="9" fill="#888">brigade-fix-a1</text>
    <text x="16" y="65" font-family="monospace" font-size="9" fill="#4ade80">◆ Writing tests...</text>
    <text x="16" y="80" font-family="monospace" font-size="9" fill="#666">  src/auth/login.ts</text>
    <text x="16" y="95" font-family="monospace" font-size="9" fill="#666">  tests/auth.test.ts</text>
    <text x="16" y="115" font-family="monospace" font-size="9" fill="#555">──────────────────</text>
    <text x="16" y="130" font-family="monospace" font-size="9" fill="#f48c06">esc to interrupt</text>

    <!-- Right pane content -->
    <text x="232" y="50" font-family="monospace" font-size="9" fill="#888">brigade-chore-c3</text>
    <text x="232" y="65" font-family="monospace" font-size="9" fill="#e85d04">🔴 needs input</text>
    <text x="232" y="80" font-family="monospace" font-size="9" fill="#666">  Which approach?</text>
    <text x="232" y="95" font-family="monospace" font-size="9" fill="#666">  [1] lazy  [2] eager</text>
    <text x="232" y="115" font-family="monospace" font-size="9" fill="#555">──────────────────</text>
    <text x="232" y="130" font-family="monospace" font-size="9" fill="#aaa">❯ _</text>
  </g>

  <!-- Main title -->
  <text x="280" y="135" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-2">brigade</text>

  <!-- Tagline -->
  <text x="282" y="175" font-family="'SF Mono', 'Fira Code', monospace" font-size="18" fill="#888">Fire your first ticket. Run the kitchen.</text>

  <!-- Divider -->
  <rect x="282" y="192" width="340" height="2" fill="url(#accent)" rx="1"/>

  <!-- Feature pills -->
  <g transform="translate(282, 210)">
    <!-- Pill 1 -->
    <rect width="100" height="24" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1" rx="12"/>
    <text x="50" y="16" font-family="monospace" font-size="10" fill="#e85d04" text-anchor="middle">⚡ Zellij</text>

    <!-- Pill 2 -->
    <rect x="112" width="110" height="24" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1" rx="12"/>
    <text x="167" y="16" font-family="monospace" font-size="10" fill="#e85d04" text-anchor="middle">🌿 Worktrunk</text>

    <!-- Pill 3 -->
    <rect x="234" width="110" height="24" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1" rx="12"/>
    <text x="289" y="16" font-family="monospace" font-size="10" fill="#e85d04" text-anchor="middle">📟 Expeditor</text>
  </g>

  <!-- Bottom: harness row -->
  <g transform="translate(282, 258)">
    <text x="0" y="12" font-family="monospace" font-size="11" fill="#555">harnesses:</text>
    <text x="90" y="12" font-family="monospace" font-size="11" fill="#4ade80">claude</text>
    <text x="148" y="12" font-family="monospace" font-size="11" fill="#555">·</text>
    <text x="158" y="12" font-family="monospace" font-size="11" fill="#60a5fa">codex</text>
    <text x="212" y="12" font-family="monospace" font-size="11" fill="#555">·</text>
    <text x="222" y="12" font-family="monospace" font-size="11" fill="#a78bfa">opencode</text>
    <text x="300" y="12" font-family="monospace" font-size="11" fill="#555">·</text>
    <text x="310" y="12" font-family="monospace" font-size="11" fill="#f472b6">pi</text>
  </g>

  <!-- Bottom orange accent bar -->
  <rect x="0" y="316" width="1200" height="4" fill="url(#accent)" rx="2" opacity="0.4"/>
</svg>
